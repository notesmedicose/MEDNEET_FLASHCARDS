name: mednotes
description: MEDNEET - NEET Prep App with Flashcards & Gamification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  provider: ^6.1.3
  flutter_markdown: ^0.7.7+1
  flutter_markdown_latex: ^0.3.4
  flutter_math_fork: ^0.7.4
  markdown: ^7.2.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - lib/data/flashcards_physics.json
    - lib/data/flashcards_chemistry.json
    - lib/data/flashcards_biology.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/logo.png"